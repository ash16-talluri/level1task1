<!DOCTYPE html>
<html>
<head>
    <title>All Tasks Combined</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Navigation Menu */
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
        }
        nav a:hover {
            color: yellow;
        }

        /* Main Content */
        .container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: blue;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin-top: 20px;
        }

        /* Form */
        .form-box {
            margin-top: 40px;
        }

        input {
            padding: 10px;
            width: 220px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Content -->
    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This page includes a heading, image, form, and navigation menu using HTML & CSS.</p>

        <img src="https://via.placeholder.com/300" alt="Sample Image">

        <!-- Form -->
        <div class="form-box">
            <h2>Simple Form</h2>
            <form>
                <input type="text" placeholder="Enter your name">
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

</body>
</html>
